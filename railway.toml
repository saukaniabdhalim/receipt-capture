# -------------------------------------------------------
# Receipt Capture System — Railway Multi-Service Config
#
# Three services share this repo. In the Railway dashboard,
# create each service and set the matching dockerfilePath:
#
#   receipt-capture-api  → Dockerfile
#   receipt-capture-bot  → Dockerfile.bot
#   receipt-capture-web  → Dockerfile.web
# -------------------------------------------------------

# ── API ─────────────────────────────────────────────────
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "dotnet ReceiptCapture.Api.dll"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
