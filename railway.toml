[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "dotnet ReceiptCapture.Api.dll"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Bot Worker Service
[[services]]
name = "receipt-capture-bot"
startCommand = "dotnet ReceiptCapture.Bot/ReceiptCapture.Bot.dll"